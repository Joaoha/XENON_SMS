services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: xenon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: xenon_sms
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xenon -d xenon_sms"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: "postgresql://xenon:${POSTGRES_PASSWORD:-changeme}@db:5432/xenon_sms"
      AUTH_SECRET: "${AUTH_SECRET}"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
